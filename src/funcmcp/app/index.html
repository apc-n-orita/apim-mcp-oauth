<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Widget</title>
    <style>
        :root {
            --bg: linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --card: rgba(255,255,255,0.1);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #818cf8;
            --shadow: 0 20px 50px rgba(0,0,0,0.35);
            --radius: 18px;
        }
        [data-theme="light"] {
            --bg: linear-gradient(145deg, #f0f4ff 0%, #e0e7ff 50%, #c7d2fe 100%);
            --card: rgba(255,255,255,0.7);
            --text: #1e1b4b;
            --muted: #6b7280;
            --accent: #4f46e5;
            --shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .widget {
            width: min(640px, 100%);
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }
        .icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            display: grid;
            place-items: center;
            font-size: 32px;
        }
        .title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .section {
            background: rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 12px;
        }
        .label {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 8px;
        }
        .message {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
            min-height: 1.5em;
        }
        .response {
            color: var(--accent);
        }
        .footer {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <div class="icon">👋</div>
            <div>
                <p class="title">Hello Widget</p>
                <p class="subtitle" id="status">Connecting...</p>
            </div>
        </div>
        <div class="section">
            <p class="label">Sent Message</p>
            <p class="message" id="input-message">Waiting for tool input…</p>
        </div>
        <div class="section">
            <p class="label">Echo Response</p>
            <p class="message response" id="response-message">—</p>
        </div>
        <div class="footer" id="footer"></div>
    </div>
    <script type="module" src="/hello-app.ts"></script>
</body>
</html>
